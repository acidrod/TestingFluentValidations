name: Security Code Scan

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write # required to upload SARIF results to GitHub Security tab

jobs:
  security-scan:
    name: Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json', '**/NuGet.Config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore TestingFluentValidations.slnx

      - name: Build with Security Code Scan analysis
        # /p:ErrorLevel=warn ensures SCS findings don't fail the build —
        # results are collected in SARIF files under the build output.
        run: dotnet build TestingFluentValidations.slnx --no-restore /p:ErrorLevel=warn

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: '.'
          category: security-code-scan
