name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json', '**/NuGet.Config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore TestingFluentValidations.slnx

      - name: Build solution
        run: dotnet build TestingFluentValidations.slnx --configuration Release --no-restore

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json', '**/NuGet.Config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore TestingFluentValidations.slnx

      - name: Run unit tests
        run: dotnet test TestingFluentValidations.slnx --configuration Release --no-restore --logger "trx;LogFileName=test-results.trx" --results-directory TestResults --verbosity normal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ github.sha }}
          path: TestResults/**/*.trx
          if-no-files-found: warn

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/global.json', '**/NuGet.Config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore TestingFluentValidations.slnx

      - name: Build with Security Code Scan analysis
        run: |
          mkdir -p results
          dotnet build src/ConsoleUI/ConsoleUI.csproj -t:Rebuild --no-restore /p:ErrorLevel=warn /p:ReportAnalyzer=true /p:ErrorLog="$GITHUB_WORKSPACE/results/security-code-scan.sarif"

      - name: Normalize SARIF to 2.1.0 for GitHub upload
        run: |
          node <<'EOF'
          const fs = require('fs');

          const input = 'results/security-code-scan.sarif';
          if (!fs.existsSync(input)) {
            console.log('No SARIF file found at ' + input + '. Skipping normalization.');
            process.exit(0);
          }

          const sarif = JSON.parse(fs.readFileSync(input, 'utf8'));

          const normalizeRule = (id, rule) => {
            const out = { id };
            if (rule?.shortDescription) out.shortDescription = { text: String(rule.shortDescription) };
            if (rule?.fullDescription) out.fullDescription = { text: String(rule.fullDescription) };
            if (rule?.helpUri) out.helpUri = String(rule.helpUri);
            if (rule?.properties) out.properties = rule.properties;
            return out;
          };

          const normalizeLocation = (loc) => {
            const resultFile = loc?.resultFile;
            if (resultFile?.uri) {
              return {
                physicalLocation: {
                  artifactLocation: { uri: resultFile.uri.replace('file:///', '') },
                  region: resultFile.region || undefined
                }
              };
            }

            const physical = loc?.physicalLocation;
            if (physical?.uri) {
              return {
                physicalLocation: {
                  artifactLocation: { uri: physical.uri.replace('file:///', '') },
                  region: physical.region || undefined
                }
              };
            }

            if (physical?.artifactLocation?.uri) {
              return {
                physicalLocation: {
                  artifactLocation: { uri: String(physical.artifactLocation.uri).replace('file:///', '') },
                  region: physical.region || undefined
                }
              };
            }

            return undefined;
          };

          const oldRuns = Array.isArray(sarif.runs) ? sarif.runs : [];
          const newRuns = [];

          for (const run of oldRuns) {
            const oldTool = run.tool || {};
            const oldRulesMap = run.rules || {};
            const allRuleIds = new Set(Object.keys(oldRulesMap));
            for (const r of run.results || []) {
              if (r?.ruleId) allRuleIds.add(r.ruleId);
            }

            const driverRules = Array.from(allRuleIds)
              .filter((id) => /^SCS\d+$/i.test(id) || /^CA53\d+$/i.test(id))
              .map((id) => normalizeRule(id, oldRulesMap[id] || {}));

            const results = (run.results || [])
              .filter((r) => /^SCS\d+$/i.test(r.ruleId || '') || /^CA53\d+$/i.test(r.ruleId || ''))
              .map((r) => {
                const locations = (r.locations || []).map(normalizeLocation).filter(Boolean);
                const relatedLocations = (r.relatedLocations || []).map(normalizeLocation).filter(Boolean);

                return {
                  ruleId: r.ruleId,
                  level: r.level || 'warning',
                  message: { text: String(r.message || '') },
                  locations,
                  relatedLocations: relatedLocations.length ? relatedLocations : undefined,
                  properties: r.properties
                };
              });

            if (!results.length) {
              continue;
            }

            newRuns.push({
              tool: {
                driver: {
                  name: oldTool.name || 'SecurityCodeScan',
                  version: oldTool.version,
                  semanticVersion: oldTool.semanticVersion,
                  informationUri: 'https://security-code-scan.github.io',
                  rules: driverRules
                }
              },
              results
            });
          }

          const normalized = {
            $schema: 'https://json.schemastore.org/sarif-2.1.0.json',
            version: '2.1.0',
            runs: newRuns
          };

          fs.writeFileSync(input, JSON.stringify(normalized, null, 2));
          console.log('SARIF normalized: ' + input);
          EOF

      - name: Verify SARIF file exists
        run: ls -la results

      - name: Count SARIF findings
        id: sarif_findings
        run: |
          node <<'EOF'
          const fs = require('fs');

          const input = 'results/security-code-scan.sarif';
          if (!fs.existsSync(input)) {
            console.log('count=0');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'count=0\n');
            process.exit(0);
          }

          const sarif = JSON.parse(fs.readFileSync(input, 'utf8'));
          const runs = Array.isArray(sarif.runs) ? sarif.runs : [];
          const count = runs.reduce((acc, run) => acc + ((run.results || []).length), 0);
          console.log(`count=${count}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `count=${count}\n`);
          EOF

      - name: Upload SARIF results to GitHub Security tab
        if: steps.sarif_findings.outputs.count != '0'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results
          category: security-code-scan

      - name: Security Gate (PR only)
        if: github.event_name == 'pull_request'
        run: |
          node <<'EOF'
          const fs = require('fs');

          const input = 'results/security-code-scan.sarif';
          if (!fs.existsSync(input)) {
            console.log('No SARIF file found for security gate: ' + input);
            process.exit(1);
          }

          const sarif = JSON.parse(fs.readFileSync(input, 'utf8'));
          const runs = Array.isArray(sarif.runs) ? sarif.runs : [];
          const allResults = runs.flatMap((r) => Array.isArray(r.results) ? r.results : []);

          // High impact rules that should block pull requests.
          const blockingRules = new Set([
            'SCS0001', // Command Injection
            'SCS0002', // SQL Injection
            'SCS0003', // XPath Injection
            'SCS0004', // Certificate Validation Disabled
            'SCS0007', // XXE
            'SCS0018', // Path Traversal
            'SCS0028', // Insecure Deserialization
            'SCS0029', // XSS
            'SCS0031', // LDAP Injection
            'CA5350',  // Weak crypto algorithm
            'CA5351'   // Weak crypto algorithm
          ]);

          const failures = allResults.filter((r) => blockingRules.has(String(r.ruleId || '').toUpperCase()));

          if (failures.length > 0) {
            console.log('Security gate failed. Blocking findings:');
            for (const f of failures) {
              console.log(`- ${f.ruleId}: ${f.message?.text || ''}`);
            }
            process.exit(1);
          }

          console.log('Security gate passed. No blocking findings detected.');
          EOF